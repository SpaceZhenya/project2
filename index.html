<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Відео Генератор</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 720px; margin: 30px auto; padding: 0 20px; text-align: center; background: #0f0f1a; color: #eee; }
    h1 { font-size: 24px; margin-bottom: 20px; color: #fff; }
    textarea { width: 100%; padding: 12px; font-size: 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #eee; resize: vertical; min-height: 60px; font-family: inherit; }
    textarea::placeholder { color: #666; }
    .row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; justify-content: center; }
    button { padding: 10px 24px; font-size: 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: .2s; }
    #saveBtn { background: #2d2d5e; color: #aaa; }
    #saveBtn:hover { background: #3d3d7e; }
    #startBtn { background: #e94560; color: #fff; flex: 1; min-width: 120px; }
    #startBtn:hover:not(:disabled) { background: #ff6b81; }
    #startBtn:disabled { opacity: .5; cursor: not-allowed; }
    #downloadBtn { background: #1a8a4a; color: #fff; }
    #downloadBtn:hover { background: #22b865; }
    canvas, video { width: 100%; max-width: 640px; border-radius: 10px; margin-top: 15px; }
    video { display: none; }
    .status { margin: 8px 0; font-size: 14px; color: #888; min-height: 20px; }
    .progress-bar { width: 100%; max-width: 640px; height: 4px; background: #222; border-radius: 2px; margin: 8px auto; overflow: hidden; display: none; }
    .progress-bar div { height: 100%; width: 0; background: #e94560; border-radius: 2px; transition: width .3s; }
    .saved-label { color: #666; font-size: 13px; margin: 4px 0 0; min-height: 20px; }
    .thumbnails { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin: 10px 0; min-height: 60px; }
    .thumbnails img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 2px solid #333; opacity: 0; transition: opacity .5s; }
    .thumbnails img.loaded { opacity: 1; }
  </style>
</head>
<body>
  <h1>AI Відео Генератор</h1>

  <textarea id="promptInput" rows="2" placeholder="Опишіть відео... наприклад: кіт гуляє пляжем на заході сонця"></textarea>

  <div class="row">
    <button id="saveBtn">Зберегти</button>
    <button id="startBtn">Старт</button>
    <button id="downloadBtn" style="display:none">Завантажити відео</button>
  </div>

  <p class="saved-label" id="savedLabel"></p>
  <p class="status" id="status">Натисніть "Старт", щоб згенерувати відео</p>

  <div class="progress-bar" id="progressBar"><div id="progressFill"></div></div>
  <div class="thumbnails" id="thumbnails"></div>

  <canvas id="canvas" width="640" height="360"></canvas>
  <video id="preview" controls></video>

  <script>
    const promptInput = document.getElementById('promptInput');
    const saveBtn = document.getElementById('saveBtn');
    const savedLabel = document.getElementById('savedLabel');
    const startBtn = document.getElementById('startBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const thumbnails = document.getElementById('thumbnails');

    let recordedBlob = null;

    const stored = localStorage.getItem('videoPrompt');
    if (stored) {
      promptInput.value = stored;
      savedLabel.textContent = 'Збережено';
    }

    saveBtn.addEventListener('click', () => {
      const text = promptInput.value.trim();
      if (text) {
        localStorage.setItem('videoPrompt', text);
        savedLabel.textContent = 'Збережено';
      }
    });

    async function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    function setProgress(pct) {
      progressFill.style.width = pct + '%';
    }

    function drawImageOnCanvas(img, offsetX, offsetY, scale) {
      const iw = img.width * scale;
      const ih = img.height * scale;
      const ix = (canvas.width - iw) / 2 + offsetX;
      const iy = (canvas.height - ih) / 2 + offsetY;
      ctx.drawImage(img, ix, iy, iw, ih);
    }

    startBtn.addEventListener('click', async () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        status.textContent = 'Спочатку введіть опис!';
        return;
      }

      status.textContent = 'Генерую зображення...';
      startBtn.disabled = true;
      preview.style.display = 'none';
      downloadBtn.style.display = 'none';
      progressBar.style.display = 'block';
      setProgress(0);
      recordedBlob = null;
      thumbnails.innerHTML = '';

      const numImages = 4;
      const urls = [];
      for (let i = 0; i < numImages; i++) {
        const seed = Date.now() + i * 1000;
        const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt + ', cinematic, highly detailed')}?seed=${seed}&width=640&height=360&nologo=true`;
        urls.push(url);
      }

      const images = [];
      for (let i = 0; i < numImages; i++) {
        try {
          const img = await loadImage(urls[i]);
          images.push(img);
          const thumb = document.createElement('img');
          thumb.src = urls[i];
          thumb.className = 'loaded';
          thumb.alt = `Frame ${i + 1}`;
          thumbnails.appendChild(thumb);
          setProgress(((i + 1) / numImages) * 30);
        } catch {
          status.textContent = 'Помилка завантаження зображень. Спробуйте інший опис.';
          startBtn.disabled = false;
          progressBar.style.display = 'none';
          return;
        }
      }

      status.textContent = 'Створюю відео...';
      setProgress(35);

      const fps = 30;
      const secPerImage = 2;
      const totalFrames = numImages * secPerImage * fps;

      const stream = canvas.captureStream(fps);
      const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      const chunks = [];
      recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      const recordingDone = new Promise(resolve => { recorder.onstop = () => { recordedBlob = new Blob(chunks, { type: 'video/webm' }); resolve(); }; });

      recorder.start();

      let frame = 0;
      for (let imgIdx = 0; imgIdx < numImages; imgIdx++) {
        const img = images[imgIdx];
        const framesForThis = secPerImage * fps;
        for (let f = 0; f < framesForThis; f++) {
          ctx.fillStyle = '#0f0f1a';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          const progress = f / framesForThis;
          const scale = 1 + progress * 0.08;
          const offsetX = Math.sin(progress * Math.PI * 2) * 8;
          const offsetY = Math.cos(progress * Math.PI * 2) * 5;

          ctx.globalAlpha = 1;
          drawImageOnCanvas(img, offsetX, offsetY, scale);

          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.shadowColor = 'rgba(0,0,0,0.8)';
          ctx.shadowBlur = 14;
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 32px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.shadowBlur = 20;
          ctx.shadowColor = 'rgba(0,0,0,0.9)';
          ctx.fillText(prompt, canvas.width / 2, canvas.height - 30);
          ctx.shadowBlur = 0;

          // watermark
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.font = '13px Arial';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'bottom';
          ctx.fillText('spacezhenya/project2', canvas.width - 12, canvas.height - 8);

          frame++;
          const pct = 35 + (frame / totalFrames) * 60;
          setProgress(pct);
          await new Promise(r => setTimeout(r, 1000 / fps));
        }
      }

      recorder.stop();
      await recordingDone;
      setProgress(100);

      const url = URL.createObjectURL(recordedBlob);
      preview.src = url;
      preview.style.display = 'block';
      downloadBtn.style.display = 'inline-block';
      status.textContent = 'Відео готове! Натисніть "Завантажити відео" щоб зберегти.';
      startBtn.disabled = false;
      setTimeout(() => { progressBar.style.display = 'none'; }, 2000);
    });

    downloadBtn.addEventListener('click', () => {
      if (!recordedBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(recordedBlob);
      a.download = 'video.webm';
      a.click();
    });
  </script>
</body>
</html>
