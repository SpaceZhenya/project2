<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELIZA — психотерапевт</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 640px; margin: 30px auto; padding: 0 16px; background: #1a1a2e; color: #e0e0e0; }
    h1 { text-align: center; font-size: 22px; color: #e94560; letter-spacing: 2px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #666; font-size: 13px; margin-bottom: 20px; }
    .chat { background: #16213e; border-radius: 12px; padding: 16px; height: 400px; overflow-y: auto; margin-bottom: 12px; scroll-behavior: smooth; }
    .chat::-webkit-scrollbar { width: 6px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .msg { margin-bottom: 12px; display: flex; }
    .msg.eliza { justify-content: flex-start; }
    .msg.you { justify-content: flex-end; }
    .bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .msg.eliza .bubble { background: #0f3460; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg.you .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
    .msg.eliza .avatar { width: 32px; height: 32px; border-radius: 50%; background: #0f3460; display: flex; align-items: center; justify-content: center; margin-right: 8px; font-size: 16px; flex-shrink: 0; }
    .msg.you .avatar { width: 32px; height: 32px; border-radius: 50%; background: #e94560; display: flex; align-items: center; justify-content: center; margin-left: 8px; font-size: 16px; flex-shrink: 0; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; padding: 12px 16px; font-size: 14px; border: 2px solid #333; border-radius: 10px; outline: none; background: #16213e; color: #e0e0e0; }
    .input-row input:focus { border-color: #e94560; }
    .input-row input::placeholder { color: #555; }
    .input-row button { padding: 12px 20px; background: #e94560; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .input-row button:hover { background: #ff6b81; }
    .tools { display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
    .tools button { background: #0f3460; color: #aaa; border: 1px solid #333; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .tools button:hover { background: #1a4a80; color: #fff; }
    .typing { color: #666; font-style: italic; font-size: 13px; text-align: center; margin: 4px 0; display: none; }
  </style>
</head>
<body>
  <h1>🧑‍⚕️ ELIZA</h1>
  <p class="subtitle">Ваш віртуальний психотерапевт (1966)</p>

  <div class="chat" id="chat"></div>
  <div class="typing" id="typing">ELIZA друкує...</div>

  <div class="input-row">
    <input type="text" id="msgInput" placeholder="Напишіть щось..." />
    <button id="sendBtn">Надіслати</button>
  </div>

  <div class="tools">
    <button id="clearBtn">Очистити історію</button>
    <button id="saveBtn">Зберегти діалог</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing');
    const clearBtn = document.getElementById('clearBtn');
    const saveBtn = document.getElementById('saveBtn');

    let history = JSON.parse(localStorage.getItem('elizaHistory') || '[]');

    const reflections = {
      am: 'are', was: 'were', i: 'you', i'd: 'you would',
      i've: 'you have', i'll: 'you will', my: 'your',
      me: 'you', mine: 'yours', myself: 'yourself',
      your: 'my', yours: 'mine', you: 'I', yourself: 'myself'
    };

    function reflect(text) {
      const words = text.toLowerCase().split(' ');
      return words.map(w => reflections[w] || w).join(' ');
    }

    const responses = [
      { match: /(мам|тат|брат|сестр|сім[ья'ї]|родин)/i, reply: 'Розкажіть більше про ваші родинні стосунки.' },
      { match: /(батьк|матер|отец)/i, reply: 'Як ви ставитеся до своїх батьків?' },
      { match: /(друг|подруг|товариш)/i, reply: 'Розкажіть про ваших друзів.' },
      { match: /(щаст|рад|добре|чудов|прекрасн)/i, reply: 'Чому ви відчуваєте це?' },
      { match: /(сум|погано|поган|жаль|плак|депрес|самотн)/i, reply: 'Мені шкода, що вам сумно. Розкажіть детальніше.' },
      { match: /(страш|боюс|тривог|хвилю|нерв)/i, reply: 'Чи часто ви відчуваєте тривогу?' },
      { match: /(зл|гнів|роздрат|бісит|дістал)/i, reply: 'Чому це викликає у вас гнів?' },
      { match: /(любл|коха|подоба|цікав|захопл)/i, reply: 'Що саме вам у цьому подобається?' },
      { match: /(ні|не|ноу|no|nah)/i, reply: 'Чому ні?' },
      { match: /(так|yes|так|ага|угу)/i, reply: 'Розкажіть більше.' },
      { match: /(можлив|напевно|здаєть|мабуть|може)/i, reply: 'Чому ви не впевнені?' },
      { match: /(сон|спит|втом|відпочи)/i, reply: 'Як у вас зі сном?' },
      { match: /(робот|прац|справ|діл|занят|хобі)/i, reply: 'Чи задоволені ви цим?' },
      { match: /(хочу|бажа|мрі|ціл)/i, reply: 'Чому ви цього хочете?' },
      { match: /(треба|потріб|мушу|повин)/i, reply: 'Чому ви вважаєте, що це обов\'язково?' },
      { match: /(дума|вважа|гада|здає)/i, reply: 'Чому ви так думаєте?' },
      { match: /(пробач|вибач|сором|перепрош)/i, reply: 'Не потрібно вибачатися. Розкажіть, що сталося.' },
      { match: /(допом|порад|підкаж)/i, reply: 'Яку саме допомогу ви шукаєте?' },
      { match: /(бувай|до побачен|папа|бай|бува)/i, reply: 'До побачення. Бережіть себе.' },
      { match: /(я |мен|мій|моє|мене)/i, reply: null }
    ];

    function getReply(text) {
      for (const r of responses) {
        if (r.match.test(text)) {
          if (r.reply === null) {
            return randomReply(text);
          }
          return r.reply;
        }
      }
      return randomReply(text);
    }

    function randomReply(text) {
      const generic = [
        'Розкажіть більше про це.',
        'Чому ви так вважаєте?',
        'Як давно це триває?',
        'Що ви відчуваєте з цього приводу?',
        'Це дуже цікаво. Продовжуйте.',
        'Я розумію. Що ще ви можете сказати?',
        'Як ви на це реагуєте?',
        'Чи впливає це на ваше життя?',
        'Розкажіть, будь ласка, детальніше.',
        'Чи говорили ви про це з кимось?',
      ];
      return generic[Math.floor(Math.random() * generic.length)];
    }

    function addMessage(who, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = who === 'eliza' ? '💬' : '👤';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      if (who === 'eliza') { div.appendChild(avatar); div.appendChild(bubble); }
      else { div.appendChild(bubble); div.appendChild(avatar); }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function renderHistory() {
      chat.innerHTML = '';
      for (const msg of history) {
        addMessage(msg.who, msg.text);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = '';

      history.push({ who: 'you', text });
      addMessage('you', text);
      localStorage.setItem('elizaHistory', JSON.stringify(history));

      typing.style.display = 'block';
      sendBtn.disabled = true;

      await new Promise(r => setTimeout(r, 600 + Math.random() * 800));

      typing.style.display = 'none';
      sendBtn.disabled = false;

      const reply = getReply(text);
      history.push({ who: 'eliza', text: reply });
      addMessage('eliza', reply);
      localStorage.setItem('elizaHistory', JSON.stringify(history));
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); msgInput.focus(); });

    clearBtn.addEventListener('click', () => {
      history = [];
      localStorage.removeItem('elizaHistory');
      renderHistory();
    });

    saveBtn.addEventListener('click', () => {
      const text = history.map(m => (m.who === 'eliza' ? 'ELIZA' : 'Ви') + ': ' + m.text).join('\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'eliza_dialog.txt';
      a.click();
    });

    renderHistory();
  </script>
</body>
</html>
