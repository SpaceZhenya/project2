<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нагадування</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #0f0f1a; color: #e0e0e0; }
    h1 { text-align: center; font-size: 24px; color: #4a9eff; margin-bottom: 20px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .add-row input { flex: 1; min-width: 140px; padding: 10px 14px; font-size: 14px; border: 2px solid #333; border-radius: 8px; outline: none; background: #1a1a2e; color: #e0e0e0; }
    .add-row input:focus { border-color: #4a9eff; }
    .add-row input[type="datetime-local"] { flex: 0 0 auto; min-width: 200px; color-scheme: dark; }
    .add-row button { padding: 10px 20px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .add-row button:hover { background: #3a8eef; }
    .reminder { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #1a1a2e; border-radius: 10px; margin-bottom: 6px; border-left: 4px solid #4a9eff; }
    .reminder.fired { border-left-color: #555; opacity: .5; }
    .reminder .info { flex: 1; }
    .reminder .text { font-size: 15px; }
    .reminder .time { font-size: 12px; color: #888; margin-top: 2px; }
    .reminder .status-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #2d2d5e; color: #4a9eff; }
    .reminder.fired .status-badge { background: #2d2d2d; color: #666; }
    .reminder .del-btn { background: none; border: none; color: #555; cursor: pointer; font-size: 20px; padding: 0 4px; }
    .reminder .del-btn:hover { color: #e74c3c; }
    .empty { text-align: center; color: #555; margin-top: 40px; font-size: 14px; }
    .perm-banner { background: #2d1a1a; border: 1px solid #5a2020; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; align-items: center; gap: 10px; }
    .perm-banner button { background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Нагадування</h1>

  <div class="perm-banner" id="permBanner">
    <span>🔔 Увімкніть сповіщення, щоб отримувати нагадування вчасно</span>
    <button id="permBtn">Увімкнути</button>
  </div>

  <div class="add-row">
    <input type="text" id="textInput" placeholder="Що нагадати?" />
    <input type="datetime-local" id="timeInput" />
    <button id="addBtn">Додати</button>
  </div>

  <div id="list"></div>
  <div class="empty" id="emptyMsg">Немає нагадувань. Додайте нове!</div>

  <script>
    const textInput = document.getElementById('textInput');
    const timeInput = document.getElementById('timeInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');
    const emptyMsg = document.getElementById('emptyMsg');
    const permBanner = document.getElementById('permBanner');
    const permBtn = document.getElementById('permBtn');

    let reminders = JSON.parse(localStorage.getItem('reminders') || '[]');

    function save() {
      localStorage.setItem('reminders', JSON.stringify(reminders));
    }

    function checkNotifications() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted') {
        permBanner.style.display = 'none';
      } else if (Notification.permission === 'denied') {
        permBanner.style.display = 'flex';
        permBtn.textContent = 'Заблоковано';
        permBtn.disabled = true;
      } else {
        permBanner.style.display = 'flex';
      }
    }

    permBtn.addEventListener('click', () => {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') permBanner.style.display = 'none';
      });
    });

    function notify(reminder) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('Нагадування', {
          body: reminder.text,
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>'
        });
      }
      // beep
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.stop(audioCtx.currentTime + 0.5);
      } catch {}
    }

    function checkReminders() {
      const now = Date.now();
      let changed = false;
      for (const r of reminders) {
        if (!r.fired && new Date(r.time).getTime() <= now) {
          r.fired = true;
          changed = true;
          notify(r);
        }
      }
      if (changed) { save(); render(); }
    }

    function render() {
      list.innerHTML = '';
      if (reminders.length === 0) {
        emptyMsg.style.display = 'block';
        return;
      }
      emptyMsg.style.display = 'none';

      const sorted = [...reminders].sort((a, b) => new Date(a.time) - new Date(b.time));

      sorted.forEach((rem, idx) => {
        const realIdx = reminders.indexOf(rem);
        const div = document.createElement('div');
        div.className = 'reminder' + (rem.fired ? ' fired' : '');

        const info = document.createElement('div');
        info.className = 'info';

        const text = document.createElement('div');
        text.className = 'text';
        text.textContent = rem.text;

        const time = document.createElement('div');
        time.className = 'time';
        const d = new Date(rem.time);
        time.textContent = d.toLocaleString('uk-UA');

        const badge = document.createElement('span');
        badge.className = 'status-badge';
        badge.textContent = rem.fired ? '✓ Сповіщено' : '⏳ Очікує';

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          reminders.splice(realIdx, 1);
          if (realIdx < 1) clearInterval(interval);
          save();
          render();
        });

        info.appendChild(text);
        info.appendChild(time);
        div.appendChild(info);
        div.appendChild(badge);
        div.appendChild(del);
        list.appendChild(div);
      });
    }

    addBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      const time = timeInput.value;
      if (!text || !time) return;

      const dt = new Date(time);
      if (dt.getTime() <= Date.now()) {
        alert('Виберіть час у майбутньому');
        return;
      }

      reminders.push({ text, time: dt.toISOString(), fired: false });
      save();
      render();
      textInput.value = '';
      timeInput.value = '';
      textInput.focus();
    });

    textInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') timeInput.focus();
    });
    timeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') addBtn.click();
    });

    checkNotifications();

    // Set default time to 10 minutes from now
    const now = new Date();
    now.setMinutes(now.getMinutes() + 10);
    timeInput.value = now.toISOString().slice(0, 16);

    render();
    setInterval(checkReminders, 2000);
  </script>
</body>
</html>
