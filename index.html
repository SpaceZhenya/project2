<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список справ</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f0f2f5; color: #1a1a2e; }
    h1 { text-align: center; font-size: 28px; margin-bottom: 24px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .add-row input { flex: 1; padding: 12px 16px; font-size: 15px; border: 2px solid #ddd; border-radius: 8px; outline: none; }
    .add-row input:focus { border-color: #4a6cf7; }
    .add-row button { padding: 12px 24px; font-size: 15px; background: #4a6cf7; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .add-row button:hover { background: #3b5de7; }
    .stats { display: flex; justify-content: space-between; font-size: 14px; color: #666; margin-bottom: 12px; }
    .stats button { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0; }
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #fff; border-radius: 8px; margin-bottom: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.08); transition: .2s; }
    .todo-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,.12); }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4a6cf7; }
    .todo-item .text { flex: 1; font-size: 15px; word-break: break-word; }
    .todo-item .text.done { text-decoration: line-through; color: #999; }
    .todo-item .del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px; padding: 0 4px; transition: .2s; }
    .todo-item .del-btn:hover { color: #e74c3c; }
    .empty { text-align: center; color: #999; margin-top: 40px; font-size: 15px; }
  </style>
</head>
<body>
  <h1>Список справ</h1>

  <div class="add-row">
    <input type="text" id="taskInput" placeholder="Додати нову справу..." />
    <button id="addBtn">Додати</button>
  </div>

  <div class="stats">
    <span id="counter">0 справ</span>
    <button id="clearDoneBtn">Видалити виконані</button>
  </div>

  <div id="list"></div>
  <div class="empty" id="emptyMsg">Список порожній. Додайте справу!</div>

  <script>
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');
    const counter = document.getElementById('counter');
    const emptyMsg = document.getElementById('emptyMsg');
    const clearDoneBtn = document.getElementById('clearDoneBtn');

    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function render() {
      list.innerHTML = '';
      if (tasks.length === 0) {
        emptyMsg.style.display = 'block';
        counter.textContent = '0 справ';
        return;
      }
      emptyMsg.style.display = 'none';

      const total = tasks.length;
      const done = tasks.filter(t => t.done).length;
      counter.textContent = `${done}/${total} виконано`;

      tasks.forEach((task, idx) => {
        const div = document.createElement('div');
        div.className = 'todo-item';

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = task.done;
        cb.addEventListener('change', () => {
          tasks[idx].done = cb.checked;
          text.classList.toggle('done', cb.checked);
          save();
          render();
        });

        const text = document.createElement('span');
        text.className = 'text' + (task.done ? ' done' : '');
        text.textContent = task.text;

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.textContent = '×';
        del.addEventListener('click', () => {
          tasks.splice(idx, 1);
          save();
          render();
        });

        div.appendChild(cb);
        div.appendChild(text);
        div.appendChild(del);
        list.appendChild(div);
      });
    }

    addBtn.addEventListener('click', () => {
      const text = taskInput.value.trim();
      if (!text) return;
      tasks.push({ text, done: false });
      save();
      render();
      taskInput.value = '';
      taskInput.focus();
    });

    taskInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    clearDoneBtn.addEventListener('click', () => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    });

    render();
  </script>
</body>
</html>
